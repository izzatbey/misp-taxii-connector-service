version: "3.8"

# Standalone compose file for the TAXII MV-Proxy.
# It joins the same docker network as opentaxii-1 and db-1 so the
# proxy can reach them by service name.

services:
  taxii-mv-proxy:
    build: .
    container_name: taxii-mv-proxy
    restart: unless-stopped
    env_file:
      - .env
    # The proxy runs on host port 9001 (was 9000, changed 2026-07-13)
    # to avoid clashing with the upstream OpenTAXII container which
    # still binds 9000 on the same Docker network. Update the
    # taxii2misp connector's DISCOVERY_URL to https://<host>:9001/taxii2/
    # so it points to this proxy instead of OpenTAXII directly.
    ports:
      - "9001:9001"
    # Same docker network as opentaxii and db-1. If yours is named
    # differently (e.g., examples_default), adjust here.
    networks:
      - opentaxii-network

networks:
  opentaxii-network:
    # Join the existing OpenTAXII compose network so we can resolve
    # `examples-db-1` and `examples-opentaxii-1` by container name.
    # (The OpenTAXII compose creates a network named `examples_default`.)
    # Use `external: true` + the actual network name shown by
    # `docker network ls` (NOT the `examples_*` container name prefix).
    external: true
    name: examples_default
